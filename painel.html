<div class="painel-cadastro">

    <label class="area-upload">
        <span class="icone-mais">+</span>
        <p>Foto ou Vídeo do Produto</p>
        <input type="file" accept="image/*,video/*" capture="environment" style="display: none;">
    </label>

    <div class="campos-texto">
        <input type="text" placeholder="Nome do Produto (Ex: Capacete Homem de Ferro)">
        <input type="number" placeholder="Preço (R$)">
        <textarea placeholder="Informações e detalhes do produto..."></textarea>
    </div>

    <div class="opcoes-pagamento">
        <p>Formas de Pagamento Aceitas:</p>
        
        <label><input type="checkbox" name="pagamento" value="pix"> Pix</label>
        <label><input type="checkbox" name="pagamento" value="credito"> Cartão de Crédito</label>
        <label><input type="checkbox" name="pagamento" value="debito"> Cartão de Débito</label>
    </div>

    <button class="btn-salvar">Publicar Produto</button>

</div>
